<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core-Stream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        select {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .status {
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-top: 20px;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        
        .info {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 Core-Stream</h1>
            <p>Frictionless Thought Logger</p>
        </div>
        
        <form id="logForm">
            <div class="form-group">
                <label for="message">Your thought or update</label>
                <textarea id="message" placeholder="What's on your mind? What did you just do?" required></textarea>
            </div>
            
            <div class="controls">
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="type">Type</label>
                    <select id="type">
                        <option value="thought">Thought</option>
                        <option value="task">Task</option>
                        <option value="bug">Bug</option>
                        <option value="note">Note</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="source">Source</label>
                    <select id="source">
                        <option value="web" selected>Web UI</option>
                    </select>
                </div>
            </div>
            
            <div class="button-group">
                <button type="submit" class="btn-primary">📤 Send</button>
                <button type="reset" class="btn-secondary">Clear</button>
            </div>
        </form>
        
        <div id="status" class="status"></div>
        
        <div class="info">
            <strong>💡 Tips:</strong><br>
            • Log your thoughts as soon as they come<br>
            • The AI will automatically classify and structure them<br>
            • Your log is saved immediately
        </div>
    </div>
    
    <script>
        const form = document.getElementById('logForm');
        const statusEl = document.getElementById('status');
        
        // Determine daemon URL (support both localhost and network access)
        const daemonUrl = (() => {
            const protocol = window.location.protocol;
            const hostname = window.location.hostname;
            const port = 8765;
            return `${protocol}//${hostname}:${port}`;
        })();
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const message = document.getElementById('message').value.trim();
            if (!message) {
                showStatus('Please enter a message', 'error');
                return;
            }
            
            const type = document.getElementById('type').value;
            const source = document.getElementById('source').value;
            
            try {
                showStatus('Sending...', 'loading');
                
                const response = await fetch(`${daemonUrl}/events`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        type: type,
                        body: message,
                        source: source,
                        context: {
                            page_title: document.title,
                            win: 'Web UI',
                            is_browser: true,
                        },
                    }),
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    const errorMsg = errorData.detail?.message || `HTTP ${response.status}`;
                    throw new Error(errorMsg);
                }
                
                showStatus('✓ Event logged successfully!', 'success');
                form.reset();
                
                // Auto-hide success message after 3 seconds
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 3000);
                
            } catch (error) {
                console.error('Error:', error);
                showStatus(`✗ Error: ${error.message}`, 'error');
            }
        });
        
        function showStatus(message, type) {
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }
        
        // Focus on textarea for better UX
        document.getElementById('message').focus();
    </script>
</body>
</html>
